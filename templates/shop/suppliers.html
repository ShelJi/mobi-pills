{% extends 'base.html' %} {% block title %}
  Supplier - Mobile Shop
{% endblock %} {% block header %}
  Supplier Management
{% endblock %} {% block content %}
  <div class="mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
    <div class="relative w-full sm:w-96">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <i class="fa-solid fa-search text-gray-400"></i>
      </div>
      <input type="text" id="searchInput" class="block w-full pl-10 pr-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg leading-5 bg-white dark:bg-darkcard text-gray-900 dark:text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-colors sm:text-sm" placeholder="Search suppliers by name..." />
    </div>
    <button onclick="openSupplierModal()" class="w-full sm:w-auto bg-primary hover:bg-blue-600 text-white font-medium py-2 px-4 rounded-lg shadow-sm hover:shadow transition-all flex items-center justify-center"><i class="fa-solid fa-plus mr-2"></i> Add Supplier</button>
  </div>

  <div class="mb-[15vh] md:mb-[0vh] bg-white dark:bg-darkcard rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-gray-50 dark:bg-gray-800/50 text-gray-500 dark:text-gray-400 text-xs uppercase tracking-wider border-b border-gray-100 dark:border-gray-700">
            <th class="py-4 px-6 font-medium">Name</th>
            <th class="py-4 px-6 font-medium">Phone 1</th>
            <th class="py-4 px-6 font-medium">Phone 2</th>
            <th class="py-4 px-6 font-medium">Email</th>
            <th class="py-4 px-6 font-medium">Address</th>
            <th class="py-4 px-6 font-medium text-right">Actions</th>
          </tr>
        </thead>
        <tbody id="suppliersBody" class="divide-y divide-gray-100 dark:divide-gray-700 text-sm">
          <!-- Suppliers loaded via JS -->
        </tbody>
      </table>
      <div id="loadingIndicator" class="p-10 text-center text-gray-400 dark:text-gray-500">
        <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-primary"></i>
        <p class="text-sm">Loading suppliers...</p>
      </div>
    </div>
  </div>

  <!-- Supplier Modal -->
  <div id="supplierModal" class="fixed inset-0 z-50 hidden overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
      <div class="fixed inset-0 transition-opacity bg-gray-900/75 backdrop-blur-sm" onclick="closeSupplierModal()"></div>

      <div class="relative inline-block w-full max-w-md p-6 overflow-hidden text-left align-middle transition-all transform bg-white dark:bg-darkcard shadow-xl rounded-2xl border border-gray-100 dark:border-gray-700">
        <div class="flex justify-between items-center mb-5 border-b border-gray-100 dark:border-gray-700 pb-3">
          <h3 class="text-xl font-bold text-gray-900 dark:text-white" id="modalTitle">Add New Supplier</h3>
          <button onclick="closeSupplierModal()" class="text-gray-400 hover:text-gray-500 focus:outline-none"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>

        <form id="supplierForm" class="space-y-4">
          <input type="hidden" id="supplierId" />

          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Supplier Name</label>
            <input type="text" id="name" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Phone Number</label>
            <input type="text" id="phone1" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>


          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Phone 2</label>
            <input type="text" id="phone2" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
            <input type="email" id="email" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Address</label>
            <input type="text" id="address" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>

          <div class="mt-6 flex justify-end space-x-3 pt-4 border-t border-gray-100 dark:border-gray-700">
            <button type="button" onclick="closeSupplierModal()" class="px-4 py-2 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors font-medium">Cancel</button>
            <button type="submit" class="px-4 py-2 bg-primary hover:bg-blue-600 text-white rounded-lg shadow-sm transition-colors font-medium flex items-center"><i class="fa-solid fa-save mr-2"></i> Save Supplier</button>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %} {% block scripts %}
<script>
	let suppliers = [];

	document.addEventListener("DOMContentLoaded", () => {
		fetchData();

		document.getElementById("searchInput").addEventListener("input", (e) => {
			renderSuppliers(e.target.value);
		});

		document.getElementById("supplierForm").addEventListener("submit", handleFormSubmit);
	});

	function getCookie(name) {
		let cookieValue = null;
		if (document.cookie && document.cookie !== "") {
			const cookies = document.cookie.split(";");
			for (let i = 0; i < cookies.length; i++) {
				const cookie = cookies[i].trim();
				if (cookie.substring(0, name.length + 1) === name + "=") {
					cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
					break;
				}
			}
		}
		return cookieValue;
	}

	const csrftoken = getCookie("csrftoken");

	function fetchData() {
		document.getElementById("loadingIndicator").style.display = "block";
		fetch("/api/suppliers/")
			.then((res) => res.json())
			.then((data) => {
				suppliers = data;
				renderSuppliers();
				document.getElementById("loadingIndicator").style.display = "none";
			})
			.catch((err) => {
				document.getElementById("loadingIndicator").innerHTML =
					`<p class="text-red-500">Failed to load suppliers</p>`;
			});
	}

	function renderSuppliers(filterText = "") {
		const tbody = document.getElementById("suppliersBody");
		tbody.innerHTML = "";

		const filtered = suppliers.filter((s) => {
			const search = filterText.toLowerCase();
			const nameMatch = s.name ? String(s.name).toLowerCase().includes(search) : false;
			const phoneMatch = s.phone ? String(s.phone).toLowerCase().includes(search) : false;
			return nameMatch || phoneMatch;
		});

		if (filtered.length === 0) {
			tbody.innerHTML = `<tr><td colspan="4" class="py-8 text-center text-gray-500">No suppliers found</td></tr>`;
			return;
		}

		filtered.forEach((supplier) => {
			const date = new Date(supplier.created_at).toLocaleDateString();
			const tr = document.createElement("tr");
			tr.className = "hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors";

			// initials icon
			const initial = supplier.name.charAt(0).toUpperCase();

			tr.innerHTML = `
                <td class="py-4 px-6">
                    <div class="flex items-center">
                        <div class="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 flex items-center justify-center font-bold mr-3 shadow-sm border border-blue-200 dark:border-blue-800">
                            ${initial}
                        </div>
                        <p class="font-bold text-gray-900 dark:text-white">${supplier.name}</p>
                    </div>
                </td>
                <td class="py-4 px-6 text-gray-700 dark:text-gray-300 font-mono">${supplier.phone1}</td>
                <td class="py-4 px-6 text-gray-700 dark:text-gray-300 font-mono">${supplier.phone2}</td>
                <td class="py-4 px-6 text-gray-700 dark:text-gray-300 font-mono">${supplier.email}</td>
                <td class="py-4 px-6 text-gray-700 dark:text-gray-300 font-mono">${supplier.address}</td>
                <td class="py-4 px-6 text-gray-500 text-sm">${date}</td>
                <td class="py-4 px-6 text-right">
                    <button onclick="editSupplier(${supplier.id})" class="text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300 p-2 transition-colors" title="Edit">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                    <button onclick="deleteSupplier(${supplier.id})" class="text-red-600 hover:text-red-800 dark:text-red-400 dark:hover:text-red-300 p-2 transition-colors ml-2" title="Delete">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </td>
            `;
			tbody.appendChild(tr);
		});
	}

	function openSupplierModal(supplier = null) {
		document.getElementById("supplierForm").reset();
		document.getElementById("supplierId").value = "";

		if (supplier) {
			document.getElementById("modalTitle").textContent = "Edit Supplier";
			document.getElementById("supplierId").value = supplier.id;
			document.getElementById("name").value = supplier.name;
			document.getElementById("phone1").value = supplier.phone1;
			document.getElementById("phone2").value = supplier.phone2;
			document.getElementById("email").value = supplier.email;
			document.getElementById("address").value = supplier.address;
		} else {
			document.getElementById("modalTitle").textContent = "Add New Supplier";
		}

		document.getElementById("supplierModal").classList.remove("hidden");
	}

	function closeSupplierModal() {
		document.getElementById("supplierModal").classList.add("hidden");
	}

	function editSupplier(id) {
		const supplier = suppliers.find((s) => s.id === id);
		if (supplier) {
			openSupplierModal(supplier);
		}
	}

	function deleteSupplier(id) {
		showConfirm("Delete Supplier", "Are you sure you want to delete this supplier?", () => {
			fetch(`/api/suppliers/${id}/`, {
				method: "DELETE",
				headers: {
					"X-CSRFToken": csrftoken,
				},
			}).then((res) => {
				if (res.ok) {
					fetchData();
					showAlert("Deleted", "Supplier has been deleted.", "success");
				} else {
					showAlert("Error", "Error deleting supplier", "error");
				}
			});
		});
	}

	function handleFormSubmit(e) {
		e.preventDefault();

		const id = document.getElementById("supplierId").value;
		const data = {
			name: document.getElementById("name").value,
	phone1: document.getElementById("phone1").value,
			phone2: document.getElementById("phone2").value,
			email: document.getElementById("email").value,
			address: document.getElementById("address").value,
		};

		const method = id ? "PUT" : "POST";
		const url = id ? `/api/suppliers/${id}/` : "/api/suppliers/";

		fetch(url, {
			method: method,
			headers: {
				"Content-Type": "application/json",
				"X-CSRFToken": csrftoken,
			},
			body: JSON.stringify(data),
		}).then((res) => {
			if (res.ok) {
				closeSupplierModal();
				fetchData();
				showAlert("Saved", "Supplier saved successfully.", "success");
			} else {
				res.json().then((data) => {
					let errStr = "Error saving supplier:";
					for (let key in data) {
						errStr += `\n${key}: ${data[key]}`;
					}
					showAlert("Error", errStr, "error");
				});
			}
		});
	}
</script>
{% endblock %}
