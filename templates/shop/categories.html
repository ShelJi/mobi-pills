{% extends 'base.html' %} {% block title %}
  Categories - Mobile Shop
{% endblock %} {% block header %}
  Category Management
{% endblock %} {% block content %}
  <div class="mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
    <div class="relative w-full sm:w-96">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <i class="fa-solid fa-search text-gray-400"></i>
      </div>
      <input type="text" id="searchInput" class="block w-full pl-10 pr-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg leading-5 bg-white dark:bg-darkcard text-gray-900 dark:text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-colors sm:text-sm" placeholder="Search categories by name or description..." />
    </div>
    <button onclick="openCategoryModal()" class="w-full sm:w-auto bg-primary hover:bg-blue-600 text-white font-medium py-2 px-4 rounded-lg shadow-sm hover:shadow transition-all flex items-center justify-center"><i class="fa-solid fa-plus mr-2"></i> Add Category</button>
  </div>

  <div class="mb-[15vh] md:mb-[0vh] bg-white dark:bg-darkcard rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-gray-50 dark:bg-gray-800/50 text-gray-500 dark:text-gray-400 text-xs uppercase tracking-wider border-b border-gray-100 dark:border-gray-700">
            <th class="py-4 px-6 font-medium">Category</th>
            <th class="py-4 px-6 font-medium">Description</th>
            <th class="py-4 px-6 font-medium text-right">Actions</th>
          </tr>
        </thead>
        <tbody id="categoriesBody" class="divide-y divide-gray-100 dark:divide-gray-700 text-sm">
          <!-- Categories loaded via JS -->
        </tbody>
      </table>
      <div id="loadingIndicator" class="p-10 text-center text-gray-400 dark:text-gray-500">
        <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-primary"></i>
        <p class="text-sm">Loading categories...</p>
      </div>
    </div>
  </div>

  <!-- Category Modal -->
  <div id="categoryModal" class="fixed inset-0 z-50 hidden overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
      <div class="fixed inset-0 transition-opacity bg-gray-900/75 backdrop-blur-sm" onclick="closeCategoryModal()"></div>

      <div class="relative inline-block w-full max-w-lg p-6 overflow-hidden text-left align-middle transition-all transform bg-white dark:bg-darkcard shadow-xl rounded-2xl border border-gray-100 dark:border-gray-700">
        <div class="flex justify-between items-center mb-5 border-b border-gray-100 dark:border-gray-700 pb-3">
          <h3 class="text-xl font-bold text-gray-900 dark:text-white" id="modalTitle">Add New Category</h3>
          <button onclick="closeCategoryModal()" class="text-gray-400 hover:text-gray-500 focus:outline-none"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>

        <form id="categoryForm" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Category Name</label>
            <input type="text" id="name" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
            <textarea id="description" rows="4" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary"></textarea>
          </div>

          <div class="mt-6 flex justify-end space-x-3 pt-4 border-t border-gray-100 dark:border-gray-700">
            <button type="button" onclick="closeCategoryModal()" class="px-4 py-2 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors font-medium">Cancel</button>
            <button type="submit" class="px-4 py-2 bg-primary hover:bg-blue-600 text-white rounded-lg shadow-sm transition-colors font-medium flex items-center"><i class="fa-solid fa-save mr-2"></i> Save Category</button>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %} {% block scripts %}
<script>
	let categories = [];

	document.addEventListener("DOMContentLoaded", () => {
		fetchData();

		document.getElementById("searchInput").addEventListener("input", (e) => {
			renderCategories(e.target.value);
		});

		document.getElementById("categoryForm").addEventListener("submit", handleFormSubmit);
	});

	function getCookie(name) {
		let cookieValue = null;
		if (document.cookie && document.cookie !== "") {
			const cookies = document.cookie.split(";");
			for (let i = 0; i < cookies.length; i++) {
				const cookie = cookies[i].trim();
				if (cookie.substring(0, name.length + 1) === name + "=") {
					cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
					break;
				}
			}
		}
		return cookieValue;
	}

	const csrftoken = getCookie("csrftoken");

	function fetchData() {
		document.getElementById("loadingIndicator").style.display = "block";
		fetch("/api/categories/")
			.then((res) => res.json())
			.then((data) => {
				categories = data;
				renderCategories();
				document.getElementById("loadingIndicator").style.display = "none";
			})
			.catch(() => {
				document.getElementById("loadingIndicator").innerHTML =
					'<p class="text-red-500">Failed to load categories</p>';
			});
	}

	function renderCategories(filterText = "") {
		const tbody = document.getElementById("categoriesBody");
		tbody.innerHTML = "";

		const filtered = categories.filter((category) => {
			const search = filterText.toLowerCase();
			const nameMatch = category.name
				? String(category.name).toLowerCase().includes(search)
				: false;
			const descriptionMatch = category.description
				? String(category.description).toLowerCase().includes(search)
				: false;
			return nameMatch || descriptionMatch;
		});

		if (filtered.length === 0) {
			tbody.innerHTML =
				'<tr><td colspan="3" class="py-8 text-center text-gray-500">No categories found</td></tr>';
			return;
		}

		filtered.forEach((category) => {
			const tr = document.createElement("tr");
			tr.className = "hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors";
			tr.innerHTML = `
                <td class="py-4 px-6">
                    <p class="font-bold text-gray-900 dark:text-white">${category.name}</p>
                </td>
                <td class="py-4 px-6 text-gray-700 dark:text-gray-300">${category.description || '<span class="text-gray-400">No description</span>'}</td>
                <td class="py-4 px-6 text-right">
                    <button onclick="deleteCategory(${category.id})" class="text-red-600 hover:text-red-800 dark:text-red-400 dark:hover:text-red-300 p-2 transition-colors" title="Delete">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </td>
            `;
			tbody.appendChild(tr);
		});
	}

	function openCategoryModal() {
		document.getElementById("categoryForm").reset();
		document.getElementById("categoryModal").classList.remove("hidden");
	}

	function closeCategoryModal() {
		document.getElementById("categoryModal").classList.add("hidden");
	}

	function deleteCategory(id) {
		showConfirm("Delete Category", "Are you sure you want to delete this category?", () => {
			fetch(`/api/categories/${id}/`, {
				method: "DELETE",
				headers: {
					"X-CSRFToken": csrftoken,
				},
			}).then((res) => {
				if (res.ok) {
					fetchData();
					showAlert("Deleted", "Category has been deleted.", "success");
				} else {
					showAlert("Error", "Error deleting category", "error");
				}
			});
		});
	}

	function handleFormSubmit(e) {
		e.preventDefault();

		const data = {
			name: document.getElementById("name").value,
			description: document.getElementById("description").value,
		};

		fetch("/api/categories/", {
			method: "POST",
			headers: {
				"Content-Type": "application/json",
				"X-CSRFToken": csrftoken,
			},
			body: JSON.stringify(data),
		}).then(async (res) => {
			if (res.ok) {
				closeCategoryModal();
				fetchData();
				showAlert("Saved", "Category saved successfully.", "success");
			} else {
				const err = await res.json().catch(() => ({}));
				const msg = Object.values(err).flat().join(" ") || "Error saving category";
				showAlert("Error", msg, "error");
			}
		});
	}
</script>
{% endblock %}
